services:
  postgres:
    image: postgres:16-alpine
    container_name: teachlink-indexer-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-teachlink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teachlink123}
      POSTGRES_DB: ${DB_DATABASE:-teachlink_indexer}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-teachlink}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    build:
      context: .
      target: development
    container_name: teachlink-indexer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      TEACHLINK_CONTRACT_ID: ${TEACHLINK_CONTRACT_ID}
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-teachlink}
      DB_PASSWORD: ${DB_PASSWORD:-teachlink123}
      DB_DATABASE: ${DB_DATABASE:-teachlink_indexer}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_LOGGING: ${DB_LOGGING:-true}
      INDEXER_POLL_INTERVAL: ${INDEXER_POLL_INTERVAL:-5000}
      INDEXER_START_LEDGER: ${INDEXER_START_LEDGER:-latest}
      INDEXER_BATCH_SIZE: ${INDEXER_BATCH_SIZE:-100}
      INDEXER_STALE_AFTER_SECONDS: ${INDEXER_STALE_AFTER_SECONDS:-900}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules
    command: npm run start:dev

  indexer-prod:
    build:
      context: .
      target: production
    container_name: teachlink-indexer-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      TEACHLINK_CONTRACT_ID: ${TEACHLINK_CONTRACT_ID}
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-teachlink}
      DB_PASSWORD: ${DB_PASSWORD:-teachlink123}
      DB_DATABASE: ${DB_DATABASE:-teachlink_indexer}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}
      INDEXER_POLL_INTERVAL: ${INDEXER_POLL_INTERVAL:-5000}
      INDEXER_START_LEDGER: ${INDEXER_START_LEDGER:-latest}
      INDEXER_BATCH_SIZE: ${INDEXER_BATCH_SIZE:-100}
      INDEXER_STALE_AFTER_SECONDS: ${INDEXER_STALE_AFTER_SECONDS:-900}
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    profiles:
      - production

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: teachlink-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - indexer-prod
      - postgres-exporter
      - alertmanager
      - blackbox-exporter
    restart: unless-stopped
    profiles:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: teachlink-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '${ALERTMANAGER_PORT:-9093}:9093'
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    depends_on:
      - alert-webhook
    restart: unless-stopped
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.1.4
    container_name: teachlink-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - observability

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: teachlink-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USERNAME:-teachlink}:${DB_PASSWORD:-teachlink123}@postgres:5432/${DB_DATABASE:-teachlink_indexer}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - observability

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: teachlink-blackbox-exporter
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    volumes:
      - ./observability/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped
    profiles:
      - observability

  alert-webhook:
    image: python:3.12-alpine
    container_name: teachlink-alert-webhook
    working_dir: /app
    command: ['python', 'server.py']
    ports:
      - '5001:5001'
    volumes:
      - ./observability/alert-webhook/server.py:/app/server.py:ro
      - alert_webhook_data:/data
    restart: unless-stopped
    profiles:
      - observability

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  alert_webhook_data:
    driver: local

networks:
  default:
    name: teachlink-indexer-network
