global:
  resolve_timeout: 5m

route:
  receiver: teachlink-webhook
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: teachlink-webhook
    webhook_configs:
      - url: http://alert-webhook:5001/alerts
        send_resolved: true
